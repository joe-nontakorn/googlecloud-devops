name: CI/CD to GCP K3s

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v1.0.${{ github.run_number }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GHCR pull secret (if not exists)
        run: |
          kubectl get secret ghcr-secret 2>/dev/null || \
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }}
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml

      - name: Update image tag in deployment.yml
        run: |
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v1.0.${{ github.run_number }}|g" k8s/deployment.yml

      - name: Deploy to K3s
        run: |
          kubectl apply -f k8s/deployment.yml
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/vue-app --timeout=120s
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml

      - name: Display deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -l app=vue-app
          echo ""
          echo "=== Service ==="
          kubectl get svc vue-app-service
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress vue-app-ingress
          echo ""
          echo "🚀 App deployed at: http://34.66.183.14"
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
