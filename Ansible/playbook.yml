---
- name: Setup GCP Server with Docker + K3s
  hosts: servers
  become: true
  gather_facts: true

  tasks:
    # ===== System Update =====
    - name: Update apt packages
      apt:
        update_cache: yes
        upgrade: yes

    # ===== Install Docker =====
    - name: Install dependencies for Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - apt-transport-https
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker repo
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: yes
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group (using shell)
      shell: usermod -aG docker {{ ansible_user }}
      become: true

    # ===== Install K3s =====
    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 120

    - name: Wait for K3s node to be Ready
      shell: kubectl get nodes --no-headers | grep -q " Ready "
      register: k3s_ready
      retries: 30
      delay: 5
      until: k3s_ready.rc == 0

    - name: Setup kubeconfig for user
      shell: |
        mkdir -p /home/{{ ansible_user }}/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/{{ ansible_user }}/.kube/config
        chown -R {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube
      args:
        creates: /home/{{ ansible_user }}/.kube/config

    # ===== Login to GHCR (ต้องมี GitHub Token) =====
    - name: Login to GitHub Container Registry
      shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u {{ ghcr_user }} --password-stdin
      when: ghcr_token is defined and ghcr_user is defined
      no_log: true

    # ===== Verify Installation =====
    - name: Verify Docker
      command: docker --version
      register: docker_version

    - name: Verify K3s
      command: k3s --version
      register: k3s_version

    - name: Verify kubectl
      command: kubectl get nodes
      register: kubectl_nodes

    - name: Display versions
      debug:
        msg:
          - "Docker: {{ docker_version.stdout }}"
          - "K3s: {{ k3s_version.stdout }}"
          - "Nodes: {{ kubectl_nodes.stdout }}"

    - name: Success message
      debug:
        msg: |
          ✅ Server setup complete!
          - Docker installed and running
          - K3s installed and running
          - kubectl configured for user {{ ansible_user }}
          - Access: ssh -i ~/.ssh/gcp_key {{ ansible_user }}@34.66.183.14
