---
- name: Install Kubernetes Dashboard
  hosts: servers
  become: true

  tasks:
    - name: Install socat (needed for port-forward)
      apt:
        name: socat
        state: present
        update_cache: yes

    - name: Install Dashboard Manifests
      shell: kubectl apply -f https://raw.githubusercontent.com/kubernetes/dashboard/v2.7.0/aio/deploy/recommended.yaml

    - name: Wait for Dashboard pods to be ready
      shell: kubectl -n kubernetes-dashboard wait --for=condition=ready pod -l k8s-app=kubernetes-dashboard --timeout=120s
      register: dashboard_ready
      retries: 5
      delay: 10
      until: dashboard_ready.rc == 0

    - name: Create Dashboard Admin User and Role Binding
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: admin-user
          namespace: kubernetes-dashboard
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: admin-user
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
        - kind: ServiceAccount
          name: admin-user
          namespace: kubernetes-dashboard
        EOF

    - name: Patch Dashboard Service to NodePort on 3001
      shell: |
        kubectl -n kubernetes-dashboard patch svc kubernetes-dashboard \
          -p '{"spec": {"type": "NodePort", "ports": [{"port": 443, "targetPort": 8443, "nodePort": 30001}]}}'

    - name: Generate Login Token
      shell: kubectl -n kubernetes-dashboard create token admin-user
      register: dashboard_token

    - name: Display Login Token
      debug:
        msg: "🔑 DASHBOARD TOKEN: {{ dashboard_token.stdout }}"

    - name: Dashboard Access Info
      debug:
        msg: |
          ✅ Kubernetes Dashboard installed!
          - URL: https://34.66.183.14:30001
          - ใช้ Token ด้านบนเพื่อ Login
          - ⚠️ Browser จะแจ้งเตือน SSL — ให้กด Advanced > Proceed
